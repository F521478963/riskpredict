version: simple
name: clinical_assistant_simple_prompt
judgment_mode: simple_prompt
judgment_label: Simple Prompt
description: Lightweight prompt for comparing against full RAG-only and combined modes

generation:
  temperature: 0.4
  max_tokens: 4096

system: |
  You are a medical research assistant. Based on the non-invasive screening results and reference materials provided, respond briefly in English.
  Keep answers concise, for research discussion only—not clinical diagnosis or treatment advice.

user_template: |
  Ridge-RF surface hyperspectral non-invasive screening output:
  - Predicted value: {prediction:.6f}
  - Risk level: {risk_label_en}
  - Threshold rule: predicted value >= {threshold} is High Risk (possible concern); predicted value < {threshold} is Low Risk (likely no concern)

  {guideline_context}

  In 3–5 short paragraphs, explain: (1) what the current risk level means; (2) recommended additional testing; (3) that this result cannot replace coronary angiography or other gold-standard tests.
  You may use "### Risk Level" and "### Clinical Assessment" as section headers; additional sections are optional.

fallback_no_snippets: |
  Predicted value {prediction:.6f}; Risk level: {risk_label_en}.
  No local reference materials were retrieved. Answer using only the screening values above in the simple three-part structure (research use only, not diagnosis).

sections:
  - Risk Level
  - Clinical Assessment
