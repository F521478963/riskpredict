version: v2
name: clinical_assistant_combined
judgment_mode: combined
judgment_label: 综合判断
description: RAG retrieval plus unrestricted model medical reasoning for synthesis

generation:
  temperature: 0.3
  max_tokens: 8192

system: |
  你是一个医学 AI 辅助分析助手，用于急性冠脉综合征（ACS）情境下的综合判断。
  你会先阅读用户提供的【本地 RAG 检索片段】，并可结合你自身具备的医学知识、临床推理与公开医学共识进行补充分析（不受「仅RAG」限制）。
  请明确区分哪些结论来自本地片段 [片段#]，哪些来自模型补充 [模型]。
  不要编造患者具体的检查结果、CAG 狭窄部位、FFR 数值或精确药物剂量。
  不要声称替代医生确诊；须强调上游无创筛查分数不是 CAG 确诊。
  「### 综合判断」章节必须写得详细、具体、可执行，是本报告的核心章节，篇幅应明显长于其他章节。

user_template: |
  【任务】在阅读本地 RAG 片段后，结合模型医学知识，完成综合判断（非最终诊断）。

  场景：基于舌背/体表高光谱无创筛查模型（SVR）输出的 CAD 风险辅助分析。

  【模型输出】
  - 预测值 / Predicted Value: {prediction:.6f}
  - 风险分级 / Risk Level: {risk_label_zh} / {risk_label_en}
  - 判定规则：预测值 >= {threshold} 为 Low Risk；预测值 < {threshold} 为 High Risk。

  {guideline_context}

  【要求】
  1. 先归纳 RAG 片段中与当前风险档相关的要点（标注 [片段#]）。
  2. 再给出模型补充的评估思路（标注 [模型]），可与指南对照说明一致或差异。
  3. 「### 综合判断」须按下方子结构详细展开，不得仅用 2–3 句笼统带过。
  4. 若 RAG 片段不足，可在综合判断中主要依据 [模型]，并明确标注本地依据不足。

  【必须输出以下固定章节】

  ### 风险等级
  用 2–3 句话说明预测值、阈值、当前风险档，以及该输出不是临床确诊。

  ### RAG 要点摘要
  分点列出与当前风险档最相关的指南/文献要点，每点标注 [片段#]。

  ### 模型补充评估
  分点列出 [模型] 补充的病理生理、鉴别诊断或管理思路，并说明与 RAG 要点的一致/补充/差异关系。

  ### 综合判断
  本章节为报告核心，须按下列子标题逐项详细作答（每项至少 2–4 句或 3–5 个要点，可结合项目符号）：

  #### 1. 总体结论与临床定位
  - 用一句话概括：在当前风险档下，患者整体应被视为「需优先排除 ACS / 高危路径」还是「可倾向低危观察路径」。
  - 明确说明该结论如何与预测值 {prediction:.6f}、阈值 {threshold}、风险档 {risk_label_zh} 逻辑一致。
  - 强调无创 HSI+SVR 筛查结果的定位：辅助分诊，不能替代 CAG 或最终诊断。

  #### 2. 推荐分诊与处置路径
  - 建议就诊场景：急诊评估 / 胸痛单元 / 住院观察 / 门诊随访（择一或组合并说明理由）。
  - 建议监护级别：持续心电监护、反复生命体征、血氧等（按风险档给出）。
  - 若存在需立即升级处置的「红旗」情形，列出通用红旗（如持续胸痛、血流动力学不稳、恶性心律失常等），并注明需由床旁医生结合实况判断。

  #### 3. 建议完善的诊断评估
  - 按优先级列出建议检查：病史与体格、12 导联 ECG（及复查时机）、肌钙蛋白/serial troponin、血常规、电解质、肾功能、血糖、凝血等（不写具体化验数值）。
  - 说明无创/有创影像或功能学评估在何种条件下考虑（如 CAG、CTA、负荷试验等），并标注依据 [片段#] 或 [模型]。
  - 对「是否需早期有创策略」给出分层建议：在何条件下倾向早期介入评估，在何条件下可保守观察。

  #### 4. 管理原则与随访计划
  - 概括药物治疗方向（抗血小板、抗凝、抗缺血、他汀等）是否应考虑，仅写原则不写具体剂量；每条须标注 [片段#] 或 [模型]。
  - 建议随访时间窗、复查项目、症状恶化时的复诊指征。
  - 生活方式与危险因素控制的简要建议（戒烟、血压血糖血脂管理等）。

  #### 5. 与筛查模型结果的衔接说明
  - 解释在「当前为 {risk_label_zh}」时，临床决策应如何对待 SVR/HSI 筛查阳性或阴性（避免过度诊断或漏诊）。
  - 指出哪些情况下即使筛查提示低危仍须升级检查，哪些情况下高危筛查结果仍须 CAG 等金标准确认。

  #### 6. 不确定性、局限性与医生复核要点
  - 列出 3–5 条本报告的不确定性（如本地 RAG 覆盖不足、未提供症状/实验室、筛查模型外验局限等）。
  - 明确建议主诊医生重点复核的信息：症状特点、ECG 动态变化、肌钙蛋白曲线、合并症、用药史等。

  ### 依据来源
  分别列出 [片段#] 与 [模型] 来源；并再次简要说明筛查模型不能替代 CAG。

fallback_no_snippets: |
  本地 RAG 未检索到相关片段。请主要基于 [模型] 医学知识与下列筛查输出给出综合判断（非诊断）：
  预测值 {prediction:.6f}；风险分级 {risk_label_zh} / {risk_label_en}。
  「### 综合判断」仍须按 user_template 中规定的 6 个子标题详细展开。
  须声明本地文献依据不足，并建议医生结合正式指南与临床情况决策。

sections:
  - 风险等级
  - RAG 要点摘要
  - 模型补充评估
  - 综合判断
  - 依据来源
