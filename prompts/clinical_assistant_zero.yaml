version: zero
name: clinical_assistant_zero_prompt
judgment_mode: zero_prompt
judgment_label: Zero-Shot Prompt
description: Minimal prompts for baseline comparison — raw model output with screening values and RAG text only
use_system_prompt: false

generation:
  temperature: 0.7
  max_tokens: 4096

system: ""

user_template: |
  Predicted value: {prediction:.6f}
  Risk level: {risk_label_en}

  {guideline_context}

fallback_no_snippets: |
  Predicted value: {prediction:.6f}; Risk level: {risk_label_en}.
  No reference materials provided.

sections: []
